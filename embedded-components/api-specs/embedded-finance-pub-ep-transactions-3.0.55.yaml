openapi: 3.0.1
info:
  title: Transactions API
  version: 3.0.55
  description: Create, track, and manage payments, such as ACH, wire, and real-time transfers, while easily filtering and retrieving transaction details by type, status, account, or date. This lets you automate fund movement and gain real-time visibility into your payment activity, all through a secure and flexible interface.
  contact:
    name: JPMC Technical Services Support
servers:
  - url: https://api.payments.jpmorgan.com/embedded/v3
    description: PRODUCTION - MTLS
  - url: https://api-mock.payments.jpmorgan.com/embedded/v3
    description: MOCK
  - url: https://api-sandbox.payments.jpmorgan.com/embedded/v3
    description: CLIENT TESTING - MTLS
tags:
  - name: Transactions
    description: Initiate and track the movement of funds, including payments.
paths:
  /transactions:
    post:
      summary: Create transaction
      description: Creates a new transaction, such as a payment via ACH, Wire or Real Time Payments (RTP).
      operationId: createTransactionV3
      tags:
        - Transactions
      parameters:
        - $ref: '#/components/parameters/configurationIdInHeaderOptional'
        - $ref: '#/components/parameters/requestIdInHeader'
      requestBody:
        required: true
        description: Contains the required information to create a payment transaction.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostTransactionRequestBaseV3'
            examples:
              Post a payment to a registered recipient using ACH:
                $ref: '#/components/examples/CreateTransactionPayoutACHReq'
              Post a payment to a registered recipient using RTP:
                $ref: '#/components/examples/CreateTransactionPayoutRTPReq'
              Post a payment to a registered recipient using WIRE:
                $ref: '#/components/examples/CreateTransactionPayoutWIRERReq'
              Post a payment to a registered recipient using ACH payInto collection:
                $ref: '#/components/examples/CreateTransactionPayIntoCollectionACHReq'
              Post a payment to an unregistered recipient using ACH:
                $ref: '#/components/examples/CreateTransactionV3ACHPayoutUnregisteredReq'
              Post a payment to an unregistered recipient using ACH IBAN:
                $ref: '#/components/examples/CreateTransactionV3ACHPayoutUnregisteredReqIBAN'
              Post a payment to an unregistered recipient using RTP:
                $ref: '#/components/examples/CreateTransactionPayoutUnregisteredRtpReq'
              Post a payment to an unregistered recipient using WIRE:
                $ref: '#/components/examples/CreateTransactionPayoutUnregisteredWireReq'
              Post a payment to an unregistered recipient using ACH payInto collection:
                $ref: '#/components/examples/CreateTransactionPayIntoCollectionUnregisteredAchReq'
              Post a payment to  on behalf of an unregistered recipient using ACH:
                $ref: '#/components/examples/CreateTransactionPayoutOnBehalfOfUnregisteredAchReq'
              Post a payment to  on behalf of an unregistered recipient using RTP:
                $ref: '#/components/examples/CreateTransactionPayoutOnBehalfOfUnregisteredRtpReq'
              Post a payment to  on behalf of an unregistered recipient using WIRE:
                $ref: '#/components/examples/CreateTransactionPayoutOnBehalfOfUnregisteredWireReq'
              Post a payment to  on behalf of an unregistered recipient using ACH payInto collection:
                $ref: '#/components/examples/CreateTransactionPayIntoCollectionOnBehalfOfUnregisteredAchReq'
              Transfer funds from one account to another:
                $ref: '#/components/examples/CreateTransactionV2VReq'
              Post a payment to a domestic US account on behalf of an international seller using ACH IAT:
                $ref: '#/components/examples/CreateTransactionPayoutInternationalIATAchReq'
      responses:
        '202':
          description: Accepted
          headers:
            request-id:
              $ref: '#/components/headers/requestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponseV3'
              examples:
                CreateTransactionRes:
                  $ref: '#/components/examples/CreateTransactionPayoutACHRes'
                CreateTransactionPayoutWIRERes:
                  $ref: '#/components/examples/CreateTransactionPayoutRTPRes'
                CreateTransactionPayoutRTPRes:
                  $ref: '#/components/examples/CreateTransactionPayoutWIRERes'
                CreateTransactionPayIntoCollectionACHRes:
                  $ref: '#/components/examples/CreateTransactionPayIntoCollectionACHRes'
                CreateTransactionV3ACHPayoutUnregisteredRes:
                  $ref: '#/components/examples/CreateTransactionV3ACHPayoutUnregisteredRes'
                CreateTransactionPayoutUnregisteredRtpRes:
                  $ref: '#/components/examples/CreateTransactionPayoutUnregisteredRtpRes'
                CreateTransactionPayoutUnregisteredWireRes:
                  $ref: '#/components/examples/CreateTransactionPayoutUnregisteredWireRes'
                CreateTransactionPayIntoCollectionUnregisteredAchRes:
                  $ref: '#/components/examples/CreateTransactionPayIntoCollectionUnregisteredAchRes'
                CreateTransactionPayoutOnBehalfOfUnregisteredAchRes:
                  $ref: '#/components/examples/CreateTransactionPayoutOnBehalfOfUnregisteredAchRes'
                CreateTransactionPayoutOnBehalfOfUnregisteredRtpRes:
                  $ref: '#/components/examples/CreateTransactionPayoutOnBehalfOfUnregisteredRtpRes'
                CreateTransactionPayoutOnBehalfOfUnregisteredWireRes:
                  $ref: '#/components/examples/CreateTransactionPayoutOnBehalfOfUnregisteredWireRes'
                CreateTransactionPayIntoCollectionOnBehalfOfUnregisteredAchRes:
                  $ref: '#/components/examples/CreateTransactionPayIntoCollectionOnBehalfOfUnregisteredAchRes'
                CreateTransactionTransferRes:
                  $ref: '#/components/examples/CreateTransactionV2VRes'
                CreateTransactionPayoutInternationalIATAchRes:
                  $ref: '#/components/examples/CreateTransactionPayoutInternationalIATAchRes'
        '400':
          $ref: '#/components/responses/400V2'
        '401':
          $ref: '#/components/responses/401V2'
        '403':
          $ref: '#/components/responses/403V2'
        '404':
          $ref: '#/components/responses/404V2'
        '500':
          $ref: '#/components/responses/500V2'
        '503':
          $ref: '#/components/responses/503V2'
    get:
      summary: List transactions
      description: Lists transactions for a specific client, which can be filtered using optional parameters.
      operationId: listTransactionsV3
      tags:
        - Transactions
      parameters:
        - in: query
          name: type
          schema:
            type: array
            items:
              $ref: '#/components/schemas/RequestTransactionType'
            minItems: 0
          description: Filters for types of transaction. Use a comma separated list to send the transaction types you require.
          required: false
          examples:
            completed:
              summary: ACH type
              value:
                - ACH
            completedAndPending:
              summary: ACH and TRANSFER type
              value:
                - ACH
                - TRANSFER
        - in: query
          name: status
          schema:
            type: array
            items:
              $ref: '#/components/schemas/RequestTransactionStatus'
            minItems: 0
          description: Filters by comma separated list of statuses for transactions.
          required: false
          examples:
            completed:
              summary: Completed status
              value:
                - COMPLETED
            completedAndPending:
              summary: Completed and Pending statuses
              value:
                - COMPLETED
                - PENDING
        - in: query
          name: accountId
          example: ae86b765e14741c5a44acc570af517ab
          schema:
            type: string
          description: Filters by the Embedded Finance account id connected to the transaction.
          required: false
        - in: query
          name: amountEquals
          example: '100'
          schema:
            type: string
          description: Filters by an exact amount.
          required: false
        - in: query
          name: amountGreaterThan
          example: '100'
          schema:
            type: string
          description: Filters by amounts greater than a specified value.
          required: false
        - in: query
          name: amountLessThan
          example: '100'
          schema:
            type: string
          description: Filters by amounts less than a specified value.
          required: false
        - in: query
          name: dateEquals
          example: '2022-01-01'
          schema:
            type: string
          description: Filters transactions by an exact date.
          required: false
        - in: query
          name: dateGreaterThan
          example: '2022-01-01'
          schema:
            type: string
          description: Filters for transactions made after this payment date.
          required: false
        - in: query
          name: dateLessThan
          example: '2022-01-01'
          schema:
            type: string
          description: Filters for transactions made before this payment date.
          required: false
        - in: query
          name: dateTimeGreaterThan
          example: '2022-01-01T00:00:00.000Z'
          schema:
            type: string
            format: date-time
          description: Filters for transactions created after this date and time.
          required: false
        - in: query
          name: dateTimeLessThan
          example: '2022-01-01T00:00:00.000Z'
          schema:
            type: string
            format: date-time
          description: Filters for transactions created before this date and time.
          required: false
        - in: query
          name: recipientId
          example: 616d93a1-ce53-4c71-b03b-02a11396db28
          schema:
            type: string
          description: Filters for transactions from/to this recipientId.
          required: false
        - in: query
          name: transactionReferenceId
          example: inv-pay-1234
          schema:
            type: string
          description: Filters for a transaction that matches a specific transaction reference ID provided by the client.
          required: false
      responses:
        '200':
          description: Ok.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListTransactionsSearchResponseV3'
              examples:
                List Transactions:
                  $ref: '#/components/examples/ListTransactionsV3'
        '400':
          $ref: '#/components/responses/400V2'
        '401':
          $ref: '#/components/responses/401V2'
        '403':
          $ref: '#/components/responses/403V2'
        '404':
          $ref: '#/components/responses/404V2'
        '500':
          $ref: '#/components/responses/500V2'
        '503':
          $ref: '#/components/responses/503V2'
  /transactions/{id}:
    parameters:
      - name: id
        in: path
        description: Unique identifier for a transaction.
        required: true
        example: m6p8kqkk5hjne3
        schema:
          type: string
    get:
      summary: Get transaction
      description: Retrieve details for a specific transaction using its unique identifier.
      operationId: getTransactionV3
      tags:
        - Transactions
      parameters:
        - $ref: '#/components/parameters/configurationIdInHeaderOptional'
        - $ref: '#/components/parameters/requestIdInHeader'
      responses:
        '200':
          description: Ok.
          headers:
            request-id:
              $ref: '#/components/headers/requestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionGetResponseV3'
              examples:
                Comprehensive transaction with all fields:
                  $ref: '#/components/examples/GetTransactionByIdComprehensive'
                Card account transaction:
                  $ref: '#/components/examples/GetTransactionByIdWithCardAccount'
                Rejected transaction with error:
                  $ref: '#/components/examples/GetTransactionByIdWithError'
                ACH payout on a transaction account:
                  $ref: '#/components/examples/GetTransactionByIdPAYOUT'
                ACH payout on a limited account:
                  $ref: '#/components/examples/GetTransactionByIdPAYOUTLIMITEDDDA'
                ACH Direct debit transaction into a transaction account:
                  $ref: '#/components/examples/GetTransactionByIdAchDirectDebitIntoTransaction'
                ACH Direct debit transaction into a limited account:
                  $ref: '#/components/examples/GetTransactionByIdAchDirectDebitIntoLimitedDDA'
                Transfer:
                  $ref: '#/components/examples/GetTransactionByIdV2V'
                Returns:
                  $ref: '#/components/examples/GetTransactionByIdRETURNDEBIT'
                Incoming Credit:
                  $ref: '#/components/examples/GetTransactionByIdPAYINTORECEIPT'
                ACH Direct debit transaction out of a limited account:
                  $ref: '#/components/examples/GetTransactionByIdPAYOUTCOLLECTION'
                Misc Credit:
                  $ref: '#/components/examples/GetTransactionByIdMISCELLANEOUSCREDIT'
                Misc Debit:
                  $ref: '#/components/examples/GetTransactionByIdMISCELLANEOUSDEBIT'
        '400':
          $ref: '#/components/responses/400V2'
        '401':
          $ref: '#/components/responses/401V2'
        '403':
          $ref: '#/components/responses/403V2'
        '404':
          $ref: '#/components/responses/404V2'
        '500':
          $ref: '#/components/responses/500V2'
        '503':
          $ref: '#/components/responses/503V2'
components:
  parameters:
    configurationIdInHeaderOptional:
      name: configuration-id
      in: header
      description: Unique identifier for the program configuration used for the request.
      required: false
      example: 549ccb74-708d-4f6b-ab21-64054abd828d
      schema:
        type: string
        format: uuid
        minLength: 1
        maxLength: 36
    requestIdInHeader:
      name: request-id
      in: header
      description: Unique identifier for the request. This identifier is specific to this particular request. If the same payload is sent in a new request, a new identifier needs to be provided
      required: false
      example: efeacff8-fd2c-4f54-a12e-2a8f90d4d325
      schema:
        type: string
        maxLength: 36
        minLength: 1
  schemas:
    RequestTransactionType:
      description: |
        The types of transaction that the client is allowed to search by. Valid values are:

        | Value | Description |
        |-------|-------------|
        | `RTP` | Realtime Transactions |
        | `ACH` | ACH Transactions |
        | `WIRE` | Wire Transactions |
        | `TRANSFER` | Transactions internal to JPMorgan |
        | `REVERSAL` | Transaction reversals |
        | `RETURN` | Transaction returns |
        | `OTHER` | Other transaction types |
        | `CARD` | Push to Card Transactions |
        | `FEE` | Fee transactions |
      type: string
      enum:
        - RTP
        - WIRE
        - ACH
        - TRANSFER
        - REVERSAL
        - RETURN
        - OTHER
        - CARD
        - FEE
      example: ACH
    RequestTransactionStatus:
      description: The statuses of the transaction that the client is allowed to search by.
      type: string
      enum:
        - PENDING
        - CANCELED
        - COMPLETED
        - COMPLETED_WITH_EXCEPTIONS
        - REJECTED
        - RETURNED
        - PARTIALLY_COMPLETED
        - UNDEFINED
      example: PENDING
    TargetCurrencyV3:
      type: string
      minLength: 3
      maxLength: 3
      description: "The creditor account / recipient currency for a foreign exchange transaction. This field is used in V3 APIs.\nSupported values \n| Code | Currency |\n|------|----------|\n| AED | United Arab Emirates Dirham |\n| AUD | Australian Dollar |\n| BGN | Bulgarian Lev |\n| BRL | Brazilian Real |\n| CAD | Canadian Dollar |\n| CHF | Swiss Franc |\n| CNY | Chinese Yuan |\n| CZK | Czech Koruna |\n| DKK | Danish Krone |\n| EUR | Euro |\n| GBP | British Pound Sterling |\n| HKD | Hong Kong Dollar |\n| HUF | Hungarian Forint |\n| ILS | Israeli New Shekel |\n| INR | Indian Rupee |\n| ISK | Icelandic Króna |\n| JPY | Japanese Yen |\n| KES | Kenyan Shilling |\n| KRW | South Korean Won |\n| MXN | Mexican Peso |\n| MYR | Malaysian Ringgit |\n| NOK | Norwegian Krone |\n| NZD | New Zealand Dollar |\n| PEN | Peruvian Sol |\n| PHP | Philippine Peso |\n| PLN | Polish Zloty |\n| RON | Romanian Leu |\n| SEK | Swedish Krona |\n| SGD | Singapore Dollar |\n| TWD | New Taiwan Dollar |\n| USD | United States Dollar |\n| VND | Vietnamese Dong |\n| ZAR | South African Rand |\n"
      example: CAD
    PageMetaData:
      type: object
      properties:
        page:
          type: integer
          minimum: 0
          format: int32
          example: 1
          description: |
            Page Number.
        limit:
          type: integer
          minimum: 0
          format: int32
          example: 30
          description: |
            Number of records per page.
        total_items:
          type: integer
          minimum: 0
          format: int32
          example: 1
          description: |
            Total number of items.
    TransactionStatus:
      description: "The current status of the transaction as it is processed:\n * `PENDING` - The transaction is still being processed.\n * `CANCELED` - The transaction has been canceled.\n * `COMPLETED` - The transaction has been completed.\n * `COMPLETED_WITH_EXCEPTIONS` - The transaction has completed, but not all of the requested criteria has been fulfilled.\n * `REJECTED` - The transaction has been rejected and will not be completed.\n * `RETURNED` - The payment rail failed to deliver funds to the recipient, so the payment was returned to the originator. \n * `UNDEFINED` - The status of this transaction cannot be found.\n"
      type: string
      enum:
        - PENDING
        - CANCELED
        - COMPLETED
        - COMPLETED_WITH_EXCEPTIONS
        - COMPLETED_NOT_IN_TARGET_WALLET
        - REJECTED
        - RETURNED
        - PARTIALLY_COMPLETED
        - UNDEFINED
      example: PENDING
    PaymentTypeResponseV3:
      description: The transaction type indicates the nature of the transaction. Certain types cannot be initiated through the API and, as a result, are excluded from the transaction request type field. API and, as a result, are excluded from the transaction request type field.
      type: string
      nullable: false
      enum:
        - RTP
        - WIRE
        - ACH
        - TRANSFER
        - REVERSAL
        - RETURN
        - OTHER
        - CARD
        - FEE
        - MISCELLANEOUS_CREDIT
        - MISCELLANEOUS_DEBIT
      example: ACH
    OriginatingTransactionV3:
      type: object
      description: Details of the originating transaction for fees, returns, or linked transactions.
      properties:
        id:
          type: string
          description: Unique identifier of the originating transaction.
          example: ff1b61523ea74c59b4ae606c6497cd52
        type:
          $ref: '#/components/schemas/PaymentTypeResponseV3'
    TransactionPaymentPurposeV3:
      description: Underlying reason for the payment transaction
      type: object
      properties:
        code:
          description: Purpose of the payment in coded form. Must be between 1 and 4 characters.
          type: string
          maxLength: 4
          example: CASH
        customCode:
          description: Purpose of the payment in proprietary form. Must be between 1 and 35 characters.
          type: string
          maxLength: 35
          example: CASH INFLOW
    TransactionFxInformation:
      description: Foreign exchange information for cross-border transactions.
      type: object
      properties:
        rateId:
          type: string
          description: Unique identifier for the foreign exchange rate
          example: R1C8E57DF6964F981D6DDB5EEf78D8
          minLength: 1
        clientSpread:
          type: string
          description: The rate at which you charge for an FX transfer. You must express this as a decimal figure. For example, if you take a commission of 10%, the spread is expressed as 0.1
          example: '0.5'
          minLength: 1
    GetTransactionFxInformationV3:
      description: Foreign exchange information for cross-border transactions.
      type: object
      allOf:
        - $ref: '#/components/schemas/TransactionFxInformation'
      properties:
        contractId:
          type: string
          description: Unique identifier for the foreign exchange contract
          example: '917490357'
        exchangeRate:
          type: string
          description: The exchange rate applied to the transaction
          example: '1.44'
    TransactionCounterPartyAddressDetailsV3:
      description: The address details of the counterparty.
      type: object
      required:
        - city
        - country
      properties:
        type:
          description: The type of the counterparty address.
          type: string
          example: RESIDENTIAL_ADDRESS
        buildingNumber:
          description: Building name or number.
          type: string
          example: Apt 2E
        streetName:
          description: The street name of the counterparty address.
          type: string
          example: 90 Bedford Street
        city:
          description: Address city.
          type: string
          example: Springfield
        country:
          type: string
          description: Two letter country code based on ISO 3166 standard, includes SEPA regions
          example: US
        countrySubDivision:
          description: State or province code.
          type: string
          example: ND
        postalCode:
          description: Postal/ZIP code.
          type: string
          example: '58008'
    TransactionCounterPartyIdentityDetailsV3:
      description: Identity details for the counterparty.
      type: object
      properties:
        idType:
          type: string
          enum:
            - USCC
            - ORGANIZATION_ID
            - NATIONAL_ID
            - TAX_ID
            - SSN
          description: Type of identification.
          minLength: 1
          example: TAX_ID
        idValue:
          type: string
          description: Identification value.
          example: '12345678901'
    TransactionCounterPartyContactDetailsV3:
      description: Contact details of the counterparty.
      type: object
      properties:
        alternateName:
          description: The alternate name of the counterparty.
          type: string
          example: Monica Downey
        phoneNumber:
          description: The phone number of the counterparty.
          type: string
          example: '+1234567890'
        emailAddress:
          description: The email address of the counterparty.
          type: string
          example: example@email.com
        website:
          description: The website of the counterparty.
          type: string
          example: https://www.example.com
    TransactionCounterPartyDetailsV3:
      description: The party details of the counterparty.
      type: object
      properties:
        type:
          description: The type of the counterparty.
          type: string
          example: INDIVIDUAL
        name:
          description: The name of the counterparty (individual or organization).
          type: string
          example: John Doe
        address:
          $ref: '#/components/schemas/TransactionCounterPartyAddressDetailsV3'
        identities:
          type: array
          description: The Identity details for the counterparty.
          items:
            $ref: '#/components/schemas/TransactionCounterPartyIdentityDetailsV3'
          minItems: 0
        contacts:
          $ref: '#/components/schemas/TransactionCounterPartyContactDetailsV3'
    RoutingInformationTransactionType:
      type: string
      nullable: false
      enum:
        - ACH
        - RTP
        - WIRE
      description: Type of transaction.
      example: RTP
    RoutingCodeType:
      type: string
      nullable: false
      enum:
        - USABA
      description: Type of routing code.
      example: USABA
    RoutingInformationV3:
      description: Routing information for the account.
      type: object
      properties:
        routingNumber:
          description: Routing number corresponding to the routing code type.
          type: string
          example: '541798298'
        transactionType:
          $ref: '#/components/schemas/RoutingInformationTransactionType'
        routingCodeType:
          $ref: '#/components/schemas/RoutingCodeType'
    TransactionCounterPartyExternalAccountDetailsV3:
      description: The external account details of the counterparty.
      type: object
      properties:
        number:
          description: The number of the counterparty account.
          type: string
          minLength: 1
          example: '021009052'
        bankName:
          description: The bank name of the counterparty external account.
          type: string
          minLength: 1
          example: Bank of America
        branchCode:
          description: The branch code of the counterparty external account.
          type: string
          minLength: 1
          example: '123456789'
        routingInformation:
          type: array
          description: Routing information details of the counterparty external account.
          items:
            $ref: '#/components/schemas/RoutingInformationV3'
          minItems: 0
        currency:
          description: The currency of the counterparty external account in ISO 4217 Alpha-3 Currency Code format.
          type: string
          minLength: 1
          maxLength: 3
          example: USD
        country:
          description: The country of the counterparty external account. Two letter country code based on ISO 3166 standard
          type: string
          minLength: 1
          example: US
    TransactionCounterPartyExternalAccountV3:
      title: External Account
      description: The external account of the counterparty
      type: object
      required:
        - type
        - externalAccount
      properties:
        type:
          description: The type of the counterparty account
          type: string
        externalAccount:
          $ref: '#/components/schemas/TransactionCounterPartyExternalAccountDetailsV3'
    TransactionCounterPartyRegisteredAccountDetailsV3:
      description: The registered account details of the counterparty.
      type: object
      properties:
        id:
          description: The id of the counterparty account.
          type: string
          example: d3371713f14e423f82065c9486ebe15b
        name:
          description: The display name of the registered account.
          type: string
          example: Primary Checking
        number:
          description: Masked registered account number.
          type: string
          example: '...4567'
        ledgerBalance:
          description: Ledger balance of the registered account after this transaction.
          type: string
          example: '1000'
        postingVersion:
          description: Posting version of the registered account at the time of this transaction.
          type: integer
          example: 1
    TransactionCounterPartyRegisteredAccountV3:
      title: Registered Account
      description: The registered account of the counterparty
      type: object
      required:
        - type
        - registeredAccount
      properties:
        type:
          description: The type of the counterparty account
          type: string
          default: REGISTERED_ACCOUNT
        registeredAccount:
          $ref: '#/components/schemas/TransactionCounterPartyRegisteredAccountDetailsV3'
    TransactionCounterPartyCardAccountDetailsV3:
      description: The card details of the counterparty account.
      type: object
      properties:
        name:
          description: The name of the counterparty card holder.
          type: string
          example: M GELLAR
        number:
          description: The number of the counterparty card holder.
          type: string
          example: '4137110019999999'
        expiryDate:
          description: The expiry date of the counterparty card holder.
          type: string
          example: '2207'
    TransactionCounterPartyCardAccountV3:
      title: Card Account
      description: The card account of the counterparty
      type: object
      required:
        - type
        - card
      properties:
        type:
          description: The type of the counterparty account
          type: string
          default: CARD
        card:
          $ref: '#/components/schemas/TransactionCounterPartyCardAccountDetailsV3'
    TransactionCounterPartyAccountV3:
      description: The account details of the counterparty.
      oneOf:
        - $ref: '#/components/schemas/TransactionCounterPartyExternalAccountV3'
        - $ref: '#/components/schemas/TransactionCounterPartyRegisteredAccountV3'
        - $ref: '#/components/schemas/TransactionCounterPartyCardAccountV3'
      discriminator:
        propertyName: type
        mapping:
          CHECKING: '#/components/schemas/TransactionCounterPartyExternalAccountV3'
          SAVINGS: '#/components/schemas/TransactionCounterPartyExternalAccountV3'
          IBAN: '#/components/schemas/TransactionCounterPartyExternalAccountV3'
          REGISTERED_ACCOUNT: '#/components/schemas/TransactionCounterPartyRegisteredAccountV3'
          CARD: '#/components/schemas/TransactionCounterPartyCardAccountV3'
          NOT_APPLICABLE: '#/components/schemas/TransactionCounterPartyExternalAccountV3'
    GetTransactionCounterPartyV3:
      type: object
      properties:
        id:
          description: The id of the counterparty.
          type: string
          example: 8f4e2b3c-1d5a-4c3b-9f0a-123456789abc
        clientId:
          description: The client identifier associated with the counterparty.
          type: string
          example: '0030000131'
        type:
          description: The type of the counterparty.
          type: string
          example: RECIPIENT
        partyDetails:
          $ref: '#/components/schemas/TransactionCounterPartyDetailsV3'
        account:
          $ref: '#/components/schemas/TransactionCounterPartyAccountV3'
    ApiErrorReasonV2:
      type: object
      description: Schema representing detailed reasons for an API error, including code, location, and message.
      required:
        - message
      properties:
        code:
          type: string
          example: '11000'
          description: Short code that identifies the error - publicly cataloged and documented
          minLength: 0
          maxLength: 5
          nullable: true
        location:
          type: string
          enum:
            - BODY
            - QUERY
            - PATH
            - HEADER
          example: BODY
          description: Part of the request which is responsible for the reason
          nullable: true
        field:
          type: string
          description: The location of the property or parameter in error
          minLength: 0
          maxLength: 512
          nullable: true
        message:
          type: string
          example: Client with ID 0031234567 does not exist.
          description: Message describing the reason. This message can typically be displayed to your platform's users, except in cases specified otherwise
          minLength: 0
          maxLength: 2048
    ApiErrorV2:
      type: object
      description: Schema representing a version 2 API error, including title, HTTP status, and additional context.
      required:
        - title
      properties:
        title:
          type: string
          description: Short humanly-readable title of the error
          example: BAD_REQUEST
          minLength: 1
          maxLength: 512
        httpStatus:
          type: integer
          description: HTTP status code
          minimum: 100
          maximum: 599
          format: int32
          example: 400
        traceId:
          type: string
          description: Internal assigned traced identifier
          minLength: 0
          maxLength: 512
        requestId:
          type: string
          description: Client provided request identifier
          minLength: 0
          maxLength: 512
        context:
          type: array
          items:
            $ref: '#/components/schemas/ApiErrorReasonV2'
          description: Provides additional context and detail on the validation errors
          minItems: 0
          maxItems: 100
    TransactionGetResponseV3:
      type: object
      required:
        - id
        - currency
        - status
        - type
      properties:
        id:
          type: string
          description: Unique identifier for the transaction.
          example: ff1b61523ea74c59b4ae606c6497cd52
        transactionReferenceId:
          description: Transaction reference id provided by client.
          type: string
          example: PAYOUTACH160901
        status:
          $ref: '#/components/schemas/TransactionStatus'
        type:
          $ref: '#/components/schemas/PaymentTypeResponseV3'
        requestedExecutionDate:
          description: The date the client requested for execution.
          type: string
          format: date
          minLength: 1
          example: '2025-09-16'
        valueDate:
          description: The date funds are considered available to the creditor.
          type: string
          format: date
          example: '2025-09-16'
        localInstrumentCode:
          description: The code that was used when creating the transaction.
          type: string
          example: PPD
        memo:
          description: Transaction information that states its purpose for easier tracking.
          type: string
          example: Memo for Transaction for 160901
        amount:
          description: The value of the transaction.
          type: string
          example: '250000'
        currency:
          description: The currency of the transaction in ISO 4217 Alpha-3 Currency Code format.
          type: string
          example: HKD
        targetAmount:
          description: Transaction value in the target currency credited to the creditor.
          type: string
          maxLength: 40
          pattern: ^\d+(\.\d+)?$
          example: '42.00'
        targetCurrency:
          description: Currency of the creditor account.
          type: string
          maxLength: 3
          pattern: ^[A-Z]{3}$
          example: USD
        originatingTransaction:
          $ref: '#/components/schemas/OriginatingTransactionV3'
        paymentPurpose:
          $ref: '#/components/schemas/TransactionPaymentPurposeV3'
        fxInformation:
          $ref: '#/components/schemas/GetTransactionFxInformationV3'
        debtor:
          $ref: '#/components/schemas/GetTransactionCounterPartyV3'
        creditor:
          $ref: '#/components/schemas/GetTransactionCounterPartyV3'
        error:
          $ref: '#/components/schemas/ApiErrorV2'
    TransactionsSearchResponseV3:
      allOf:
        - $ref: '#/components/schemas/TransactionGetResponseV3'
    ListTransactionsSearchResponseV3:
      type: object
      required:
        - metadata
        - items
      properties:
        metadata:
          $ref: '#/components/schemas/PageMetaData'
        items:
          type: array
          nullable: false
          description: List of transactions meeting the request criteria
          items:
            $ref: '#/components/schemas/TransactionsSearchResponseV3'
          minItems: 0
    PaymentType:
      description: |
        The type of transaction being initiated. Valid values are:

        | Value | Description |
        |-------|-------------|
        | `RTP` | Realtime Transactions |
        | `ACH` | ACH Transactions |
        | `WIRE` | Wire Transactions |
        | `TRANSFER` | Transactions internal to JPMorgan |
        | `CARD` | Push to Card Transactions |
      type: string
      nullable: false
      enum:
        - RTP
        - WIRE
        - ACH
        - TRANSFER
        - CARD
      example: ACH
    buildingNumber:
      type: string
      minLength: 0
      maxLength: 16
      description: Building name or number if address is in a building
    city:
      type: string
      minLength: 1
      maxLength: 34
      pattern: ^(.|\s)*\S(.|\s)*$
      example: New York
      description: Address city.
    state:
      type: string
      maxLength: 30
      example: NY
      description: State code in alpha-2 format. State is mandatory for countries like United States.
    postalCode:
      type: string
      maxLength: 10
      example: '10014'
      description: Postal/ZIP code.
    TransactionCounterPartyAddressDetails:
      description: The address details of the counterparty
      type: object
      required:
        - streetName
        - city
        - country
      properties:
        type:
          description: |
            The type of the counterparty address. Valid values are:
            | type | Description |
            |-----------------|-------------|
            | `RESIDENTIAL_ADDRESS` | Residential addresses |
            | `BUSINESS_ADDRESS` | Business addresses |
          type: string
          example: RESIDENTIAL_ADDRESS
          minLength: 1
        buildingNumber:
          $ref: '#/components/schemas/buildingNumber'
        streetName:
          description: The street name of the counterparty address
          type: string
          example: Main Street
          minLength: 1
          maxLength: 70
        city:
          $ref: '#/components/schemas/city'
        country:
          type: string
          description: Two letter country code based on ISO 3166 standard, includes SEPA regions
          example: US
        countrySubDivision:
          $ref: '#/components/schemas/state'
        postalCode:
          $ref: '#/components/schemas/postalCode'
    TransactionCounterPartyIdentityDetails:
      type: object
      required:
        - idType
        - idValue
      properties:
        idType:
          type: string
          nullable: false
          description: Type of identification
          minLength: 1
          example: USCC
        idValue:
          minLength: 1
          maxLength: 255
          type: string
          description: Identification value
          example: 91310000717860841G
    TransactionCounterPartyContactDetails:
      description: contact details of the counterparty
      type: object
      properties:
        alternateName:
          type: string
          description: The alternate name of the counterparty
          minLength: 1
        phoneNumber:
          description: The phone number of the counterparty
          type: string
          example: '+1234567890'
          minLength: 1
          maxLength: 30
        emailAddress:
          description: The email address of the counterparty
          type: string
          example: example@email.com
          minLength: 1
          maxLength: 256
        website:
          description: The website of the counterparty
          type: string
          minLength: 1
          example: https://www.example.com
    TransactionCounterPartyDetails:
      description: The party details of the counterparty
      type: object
      properties:
        type:
          description: |
            The type of party this counterparty represents.
            | Value | Description |
            |-------|-------------|
            | `INDIVIDUAL` | For individual party types |
            | `ORGANIZATION` | For organization party types |
          type: string
          minLength: 1
          example: INDIVIDUAL
        firstName:
          description: The first name of the counterparty
          type: string
          example: John
          minLength: 1
          maxLength: 70
          pattern: ^(.|\s)*\S(.|\s)*$
        lastName:
          description: The last name of the counterparty
          type: string
          example: Doe
          minLength: 1
          maxLength: 70
          pattern: ^(.|\s)*\S(.|\s)*$
        businessName:
          description: The organization name of the counterparty
          type: string
          example: XYZ Corp
          minLength: 1
          maxLength: 140
          pattern: ^(.|\s)*\S(.|\s)*$
        address:
          $ref: '#/components/schemas/TransactionCounterPartyAddressDetails'
        identities:
          type: array
          description: The Identity details for the counterparty
          items:
            $ref: '#/components/schemas/TransactionCounterPartyIdentityDetails'
          minItems: 0
        contacts:
          $ref: '#/components/schemas/TransactionCounterPartyContactDetails'
    RoutingNumber:
      type: string
      nullable: false
      minLength: 1
      maxLength: 13
      pattern: ^[A-Za-z0-9]([A-Za-z0-9\-]{0,11})[A-Za-z0-9]$
      description: Routing number corresponding to the routing code type
      example: '021000021'
    TransactionCounterPartyAccountRoutingInformation:
      type: object
      required:
        - routingNumber
        - transactionType
        - routingCodeType
      properties:
        routingNumber:
          $ref: '#/components/schemas/RoutingNumber'
        transactionType:
          $ref: '#/components/schemas/RoutingInformationTransactionType'
        routingCodeType:
          type: string
          nullable: false
          description: Type of routing code.
          minLength: 1
          example: USABA
    TransactionCounterPartyExternalAccountDetails:
      description: The external account details of the counterparty
      type: object
      properties:
        number:
          description: The number of the counterparty account
          type: string
          minLength: 1
          example: '021009052'
        bankName:
          description: The bank name of the counterparty external account
          type: string
          minLength: 1
          example: Bank of America
        branchCode:
          description: The branch code of the counterparty external account
          type: string
          minLength: 1
          example: '123456789'
        routingInformation:
          type: array
          description: routing information details of the counterparty external account
          items:
            $ref: '#/components/schemas/TransactionCounterPartyAccountRoutingInformation'
          minItems: 0
        currency:
          description: The currency of the counterparty external account
          type: string
          minLength: 1
          example: USD
        country:
          description: The country of the counterparty external account
          type: string
          minLength: 1
          example: US
    TransactionCounterPartyExternalAccount:
      title: External Account
      description: The external account of the counterparty
      type: object
      required:
        - type
        - externalAccount
      properties:
        type:
          description: |
            The type of the counterparty account. Can be

            | type | Description |
            |-----------------|-------------|
            | `CHECKING` | For checking accounts |
            | `SAVINGS` | For savings accounts |
            | `IBAN` | For IBANs |
            | `NOT_APPLICABLE` | For when account type is not available |
          type: string
          minLength: 1
        externalAccount:
          $ref: '#/components/schemas/TransactionCounterPartyExternalAccountDetails'
    TransactionCounterPartyRegisteredAccountDetails:
      description: The registered account details of the counterparty
      type: object
      required:
        - id
      properties:
        id:
          description: The id of the counterparty account
          type: string
          minLength: 1
          maxLength: 35
          pattern: ^(.|\s)*\S(.|\s)*$
          example: dc2eda9084bf40b7a1d8baa8c5e0ea0ax
    TransactionCounterPartyRegisteredAccount:
      title: Registered Account
      description: The registered account of the counterparty
      type: object
      required:
        - type
        - registeredAccount
      properties:
        type:
          description: The type of the counterparty account. Should be `REGISTERED_ACCOUNT` for accounts that are registered on JPMorgan's system and can be looked up via the /accounts API.
          type: string
          minLength: 1
          default: REGISTERED_ACCOUNT
        registeredAccount:
          $ref: '#/components/schemas/TransactionCounterPartyRegisteredAccountDetails'
    TransactionCounterPartyCardAccountDetails:
      description: The routing information of the counterparty account
      type: object
      required:
        - name
        - number
        - expiryDate
      properties:
        name:
          description: The name of the counterparty card holder
          type: string
          maxLength: 140
          minLength: 1
          example: M GELLAR
        number:
          description: The number of the counterparty card holder
          type: string
          example: '4137110019999999'
          minLength: 1
          maxLength: 35
        expiryDate:
          description: The expiry date of the counterparty card holder in YYMM format
          type: string
          example: '2205'
          minLength: 1
          maxLength: 4
          pattern: ^(?:[0-9]{2})(0[1-9]|1[0-2])$
    TransactionCounterPartyCardAccount:
      title: Card Account
      description: The card account of the counterparty
      type: object
      required:
        - type
        - card
      properties:
        type:
          description: The type of the counterparty account. Should be `CARD` for card accounts that can be used for push to card transactions.
          type: string
          minLength: 1
          default: CARD
        card:
          $ref: '#/components/schemas/TransactionCounterPartyCardAccountDetails'
    TransactionCounterPartyAccount:
      description: The account details of the counterparty
      oneOf:
        - $ref: '#/components/schemas/TransactionCounterPartyExternalAccount'
        - $ref: '#/components/schemas/TransactionCounterPartyRegisteredAccount'
        - $ref: '#/components/schemas/TransactionCounterPartyCardAccount'
      discriminator:
        propertyName: type
        mapping:
          CHECKING: '#/components/schemas/TransactionCounterPartyExternalAccount'
          SAVINGS: '#/components/schemas/TransactionCounterPartyExternalAccount'
          IBAN: '#/components/schemas/TransactionCounterPartyExternalAccount'
          REGISTERED_ACCOUNT: '#/components/schemas/TransactionCounterPartyRegisteredAccount'
          CARD: '#/components/schemas/TransactionCounterPartyCardAccount'
    TransactionCounterParty:
      type: object
      properties:
        id:
          description: The id of the counterparty
          type: string
          example: 8f4e2b3c-1d5a-4c3b-9f0a-123456789abc
          minLength: 1
          maxLength: 36
        type:
          description: |
            The type of the counterparty
            | Value | Description |
            |-------|-------------|
            | `ON_BEHALF_OF` | When performing TP3 (Third Party) Flows this field needs to be set |
          type: string
          example: ON_BEHALF_OF
          minLength: 1
        partyDetails:
          $ref: '#/components/schemas/TransactionCounterPartyDetails'
        account:
          $ref: '#/components/schemas/TransactionCounterPartyAccount'
    TransactionPaymentPurpose:
      description: The purpose of the payment
      type: object
      properties:
        code:
          description: Purpose of the payment in coded form. Must be between 1 and 4 characters.
          type: string
          minLength: 1
          maxLength: 4
          example: CASH
        customCode:
          description: Purpose of the payment in proprietary form. Must be between 1 and 35 characters.
          type: string
          minLength: 1
          maxLength: 35
          example: CASH INFLOW
    PostTransactionRequestBaseV3:
      type: object
      required:
        - currency
        - transactionReferenceId
        - type
      properties:
        transactionReferenceId:
          description: A unique reference ID that you must generate and provide for each transaction.
          type: string
          pattern: '[_0-9A-Za-z]+'
          minLength: 1
          maxLength: 35
          example: Inv-Pay-1234
        type:
          $ref: '#/components/schemas/PaymentType'
        amount:
          description: The amount that is moved out or into your account in the currency specified
          type: string
          minLength: 1
          maxLength: 40
          pattern: ^\d+(\.\d+)?$
          example: '42.00'
        currency:
          description: "This denotes the currency of the payment in ISO 4217 Alpha-3 Currency Code format\nSupported values \n| Code | Currency |\n|------|----------|\n| USD | United States Dollar |\n"
          type: string
          minLength: 3
          maxLength: 3
          nullable: false
          example: USD
        targetCurrency:
          $ref: '#/components/schemas/TargetCurrencyV3'
        localInstrumentCode:
          description: |
            Each ACH payment uses a Standard Entry class code (SEC) to indicate account type and authorization method used. <br>
            Defaults to PPD for consumer, `CCD` for business, and `WEB` for direct debits ACH if no mandate method is specified. <br>
            See documentation for further details <br>

            | LocalInstrumentCode | Meaning                                                                |
            |---------------------|------------------------------------------------------------------------|
            | * `CCD`                 | Urgent Payment Net Settlement Corporate Credit or Debit (CCD)          |
            | * `PPD`                  | Pre-arranged Payments or Deposit Transfer(PPD)                         |
            | * `TEL`                  | TELEPHONE Initiated Entry - Used for authorizing payment via telephone |
            | * `WEB`                  | WEB Initiated Entry - Used for authorizing payment over the internet   |
          type: string
          example: PPD
          minLength: 1
          maxLength: 35
        memo:
          description: Transaction information that states its purpose for easier tracking
          type: string
          pattern: ^(.|\s)*\S(.|\s)*$
          minLength: 1
          maxLength: 140
          example: Invoice 1234
        fxInformation:
          $ref: '#/components/schemas/TransactionFxInformation'
        debtor:
          $ref: '#/components/schemas/TransactionCounterParty'
        creditor:
          $ref: '#/components/schemas/TransactionCounterParty'
        paymentPurpose:
          $ref: '#/components/schemas/TransactionPaymentPurpose'
    TransactionResponseV3:
      type: object
      required:
        - transactionReferenceId
      properties:
        id:
          description: The resource Id of your transaction to use when looking up details of this transaction.
          type: string
          minLength: 1
          example: '123434534'
        transactionReferenceId:
          description: Transaction reference ID provided by client
          minLength: 1
          nullable: false
          type: string
          example: inv-pay-1234
        requestedExecutionDate:
          description: ISO date format - yyyy-MM-dd
          minLength: 1
          type: string
          format: date
          example: '1970-01-01'
